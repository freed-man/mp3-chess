{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}

<div class="row mt-4">
    <div class="col-md-6 offset-md-3">
        <h3>Welcome to Chess Club!</h3>
        <p> Already have an account? <a href="{% url 'account_login' %}">Sign in here</a></p>
        <form method="post" action="{% url 'account_signup' %}">
            {{ form | crispy }}
            {% csrf_token %}
            <div id="id_password1_helptext" class="form-text text-muted visually-hidden">
                Your password must contain at least 8 characters.
            </div>
            <button type="submit" class="btn btn-dark mt-2">Sign Up</button>
        </form>
    </div>
</div>

{% endblock content %}

{% block extras %}
<script>
    const passwordFields = document.querySelectorAll('input[type="password"]');
    const toggleBtn = document.createElement('button');
    toggleBtn.type = 'button';
    toggleBtn.className = 'btn btn-outline-secondary btn-sm mt-1';
    toggleBtn.textContent = 'Show Passwords';
    passwordFields[passwordFields.length - 1].parentNode.appendChild(toggleBtn);

    toggleBtn.addEventListener('click', function () {
        const isHidden = passwordFields[0].type === 'password';
        passwordFields.forEach(function (field) {
            field.type = isHidden ? 'text' : 'password';
        });
        toggleBtn.textContent = isHidden ? 'Hide Passwords' : 'Show Passwords';
    });
</script>
{% endblock %}
